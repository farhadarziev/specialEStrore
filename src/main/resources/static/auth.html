<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход / Регистрация</title>
</head>
<body>

<h2 id="title">Вход</h2>

<input id="login" placeholder="Логин"><br>
<input id="password" type="password" placeholder="Пароль"><br>

<div id="registerFields" style="display: none;">
    <input id="name" placeholder="Имя"><br>
    <input id="surname" placeholder="Фамилия"><br>
    <input id="phoneNum" placeholder="Телефон"><br>
</div>

<br>
<button onclick="submitAuth()">Войти</button>

<p id="toggle">
    Нет аккаунта?
    <a href="#" onclick="switchMode()">Зарегистрироваться</a>
</p>

<script src="/js/api.js"></script>
<script src="/js/auth.js?v=3"></script>
</body>
</html>
