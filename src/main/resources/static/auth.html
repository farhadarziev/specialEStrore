<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход / Регистрация</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<div id="notification-container"></div>

<div class="auth-page">
    <div class="auth-card">
        <h2 id="title">Вход</h2>
        <p class="auth-subtitle">Добро пожаловать в EStore</p>

        <div class="auth-form">
            <input id="login" placeholder="Логин">
            <input id="password" type="password" placeholder="Пароль">

            <div id="registerFields" style="display: none;">
                <input id="name" placeholder="Имя">
                <input id="surname" placeholder="Фамилия">
                <input id="phoneNum" placeholder="Телефон">
            </div>

            <div id="form-message" class="form-message"></div>

            <button id="submitBtn" class="auth-btn" onclick="submitAuth()">Войти</button>

            <p id="toggle" class="auth-toggle">
                Нет аккаунта?
                <a href="#" onclick="switchMode()">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js?v=5"></script>
</body>
</html>
