<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталог</title>
  <link rel="stylesheet" href="/css/catalog.css?v=6">
</head>
<body>

<div class="catalog-section">
  <h2 id="title">Каталог продукции</h2>

  <div class="catalog-grid">

    <div class="catalog-item">
      <a href="/catalog.html?category=signal">
        <img src="/images/svet.png">
        <p>Сигнальные устройства</p>
      </a>
    </div>

    <div class="catalog-item">
      <a href="/catalog.html?category=zvuk">
        <img src="/images/zvuk.png">
        <p>Звуковое оборудование</p>
      </a>
    </div>

    <div class="catalog-item">
      <a href="/catalog.html?category=control">
        <img src="/images/control.png">
        <p>Контрольно-управляющие устройства</p>
      </a>
    </div>

    <div class="catalog-item">
      <a href="/catalog.html?category=aksessuary">
        <img src="/images/akessuari.png">
        <p>Аксессуары</p>
      </a>
    </div>

    <div class="catalog-item">
      <a href="/catalog.html?category=montazh">
        <img src="/images/montazh.png">
        <p>Монтажное оборудование</p>
      </a>
    </div>
  </div>

  <div class="catalog-search">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию товара">
    <button id="searchBtn" class="search-btn" type="button">Найти</button>
    <button id="resetBtn" class="reset-btn" type="button">Сбросить</button>
  </div>

  <hr>
  <div id="products"></div>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>

  <script src="/js/catalog.js?v=4"></script>
</div>
</body>
</html>
