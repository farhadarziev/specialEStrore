<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
<div class="profile-page">
    <div class="profile-container">
        <h1>Личный кабинет</h1>

        <div class="profile-info">
            <div class="info-card" id="login">Логин:</div>
            <div class="info-card" id="name">Имя:</div>
            <div class="info-card" id="surname">Фамилия:</div>
            <div class="info-card" id="phone">Телефон:</div>
            <div class="info-card" id="registeredAt">Дата регистрации:</div>
        </div>

        <div class="orders-header">
            <h2>Мои заказы</h2>
            <button id="historyBtn" class="history-btn" type="button">История</button>
        </div>

        <div id="ordersShortList" class="orders-short-list"></div>

        <button id="logoutBtn" class="logout-btn" type="button">Выйти</button>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
